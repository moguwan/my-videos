<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品牌 C - 品牌官网</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="main-nav">
        <a href="../index.html" class="nav-logo">LOGO</a>
        <div class="nav-links">
            <a href="../index.html" class="nav-link">首页</a>
            <a href="a.html" class="nav-link">品牌 A</a>
            <a href="b.html" class="nav-link">品牌 B</a>
            <a href="c.html" class="nav-link active">品牌 C</a>
        </div>
    </nav>

    <section class="hero brand-hero">
        <h1 class="reveal-el" data-reveal="up">品牌 C</h1>
        <p class="hero-sub reveal-el" data-reveal="up" data-delay="0.1">匠心品质，值得信赖</p>
        <span class="scroll-hint">Scroll to explore</span>
    </section>

    <section class="brand-content">
        <div class="content-block reveal-el" data-reveal="up">
            <h2 class="block-title">品牌理念</h2>
            <p class="block-text">品牌 C 秉承匠心精神，每一件产品都经过严格把关，只为给您最好的体验。</p>
        </div>
        <div class="content-block reveal-el" data-reveal="left">
            <h2 class="block-title">核心优势</h2>
            <p class="block-text">匠心工艺、品质保证、贴心服务。</p>
        </div>
    </section>

    <section class="horizontal-scroll-wrap">
        <div class="horizontal-scroll-pin">
            <h2 class="horizontal-title reveal-el" data-reveal="up">品牌 C 数据</h2>
            <div class="horizontal-track">
                <div class="horizontal-panel"><span class="panel-num" data-count="1000">0</span><span class="panel-label">+ 客户</span></div>
                <div class="horizontal-panel"><span class="panel-num" data-count="10">0</span><span class="panel-label">年质保</span></div>
                <div class="horizontal-panel"><span class="panel-num" data-count="99">0</span><span class="panel-label">% 复购率</span></div>
            </div>
        </div>
    </section>

    <section class="stats-section">
        <h2 class="section-title reveal-el" data-reveal="up">核心数据</h2>
        <div class="stats-grid">
            <div class="stat-item reveal-el" data-reveal="up">
                <span class="stat-num" data-count="1000">0</span>
                <span class="stat-unit">+</span>
                <span class="stat-desc">服务客户</span>
            </div>
            <div class="stat-item reveal-el" data-reveal="up">
                <span class="stat-num" data-count="99">0</span>
                <span class="stat-unit">%</span>
                <span class="stat-desc">复购率</span>
            </div>
            <div class="stat-item reveal-el" data-reveal="up">
                <span class="stat-num" data-count="10">0</span>
                <span class="stat-unit">年</span>
                <span class="stat-desc">质保承诺</span>
            </div>
        </div>
    </section>

    <section class="footer">
        <p>© 2025 品牌 C</p>
        <a href="../index.html" class="footer-link">返回首页</a>
    </section>

    <script src="../js/animations.js"></script>
</body>
</html>
